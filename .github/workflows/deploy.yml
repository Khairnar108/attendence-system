name: Deploy Flask App to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-south-1
      APPLICATION_NAME: attendance-app
      DEPLOYMENT_GROUP: attendance-app-group
      S3_BUCKET: attendence-app-deploy-aniket

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create deployment bundle
        run: |
          zip -r deployment.zip . \
            -x "*.git*" \
            -x "venv/*" \
            -x "__pycache__/*"

      - name: Upload bundle to S3
        run: |
          aws s3 cp deployment.zip s3://${{ env.S3_BUCKET }}/deployment.zip

      - name: Trigger AWS CodeDeploy deployment
        run: |
          aws deploy create-deployment \
            --application-name "${{ env.APPLICATION_NAME }}" \
            --deployment-group-name "${{ env.DEPLOYMENT_GROUP }}" \
            --deployment-config-name CodeDeployDefault.AllAtOnce \
            --s3-location bucket=${{ env.S3_BUCKET }},bundleType=zip,key=deployment.zip \
            --region ${{ env.AWS_REGION }}
